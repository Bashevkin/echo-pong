apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong
  namespace: ping-pong
  labels:
    app: ping-pong
spec:
  selector:
    matchLabels:
      app: ping-pong
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - arm64
      containers:
        - name: ping-pong
          image: ghcr.io/bashevkin/echo-pong:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: ping-pong-config
                  key: PORT
            - name: SECRET_FILE_PATH
              value: /etc/ping-pong/secret.txt
          volumeMounts:
            - name: secret-volume
              mountPath: /etc/ping-pong
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
      volumes:
        - name: secret-volume
          secret:
            secretName: ping-pong-secret
